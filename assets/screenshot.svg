<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" width="720" height="620">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Terminal window -->
  <rect x="20" y="20" width="680" height="580" rx="12" fill="#0c0c0c" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="680" height="40" rx="12" fill="#1c1c1c"/>
  <rect x="20" y="48" width="680" height="12" fill="#1c1c1c"/>
  <circle cx="46" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="68" cy="40" r="7" fill="#febc2e"/>
  <circle cx="90" cy="40" r="7" fill="#28c840"/>
  <text x="360" y="45" text-anchor="middle" fill="#666" font-family="SF Mono, Menlo, monospace" font-size="13">syscheck.sh</text>

  <!-- Terminal content area -->
  <g font-family="SF Mono, Menlo, Consolas, monospace" font-size="13">

    <!-- Prompt -->
    <text x="40" y="86" fill="#7c3aed">$</text>
    <text x="55" y="86" fill="#e2e8f0">./syscheck.sh</text>

    <!-- Title -->
    <text x="40" y="116" fill="#f8fafc" font-weight="bold" font-size="14">System Health Check</text>
    <text x="40" y="134" fill="#64748b" font-size="12">2026-04-25 16:37:26</text>

    <!-- CPU Hogs -->
    <text x="40" y="164" fill="#f8fafc" font-weight="bold">CPU Hogs (&gt;10%)</text>
    <text x="40" y="180" fill="#475569">─────────────────────────────────────────────</text>
    <text x="40" y="198" fill="#64748b">PID        %CPU   %MEM  PROCESS</text>
    <text x="40" y="216" fill="#22c55e" font-size="12">  (none — system is chill)</text>

    <!-- Memory Hogs -->
    <text x="40" y="248" fill="#f8fafc" font-weight="bold">Memory Hogs (&gt;200 MB)</text>
    <text x="40" y="264" fill="#475569">─────────────────────────────────────────────</text>
    <text x="40" y="282" fill="#64748b">PID           RSS   %CPU  PROCESS</text>

    <text x="40" y="300" fill="#e2e8f0">30466</text>
    <text x="150" y="300" fill="#eab308">1321 MB</text>
    <text x="260" y="300" fill="#e2e8f0">1.7%</text>
    <text x="340" y="300" fill="#e2e8f0">Brave</text>

    <text x="40" y="318" fill="#e2e8f0">36714</text>
    <text x="150" y="318" fill="#eab308"> 668 MB</text>
    <text x="260" y="318" fill="#e2e8f0">0.3%</text>
    <text x="340" y="318" fill="#e2e8f0">claude</text>

    <text x="40" y="336" fill="#e2e8f0">45481</text>
    <text x="150" y="336" fill="#eab308"> 496 MB</text>
    <text x="260" y="336" fill="#e2e8f0">1.0%</text>
    <text x="340" y="336" fill="#e2e8f0">claude</text>

    <text x="40" y="354" fill="#e2e8f0">9053</text>
    <text x="150" y="354" fill="#eab308"> 280 MB</text>
    <text x="260" y="354" fill="#e2e8f0">1.0%</text>
    <text x="340" y="354" fill="#e2e8f0">WhatsApp</text>

    <!-- Open Ports -->
    <text x="40" y="386" fill="#f8fafc" font-weight="bold">Open Listening Ports</text>
    <text x="40" y="402" fill="#475569">─────────────────────────────────────────────</text>

    <text x="40" y="420" fill="#e2e8f0">ControlCe</text>
    <text x="200" y="420" fill="#22c55e">PID:668</text>
    <text x="310" y="420" fill="#e2e8f0">port 5000</text>

    <text x="40" y="438" fill="#e2e8f0">ControlCe</text>
    <text x="200" y="438" fill="#22c55e">PID:668</text>
    <text x="310" y="438" fill="#e2e8f0">port 7000</text>

    <text x="40" y="456" fill="#e2e8f0">rapportd</text>
    <text x="200" y="456" fill="#22c55e">PID:647</text>
    <text x="310" y="456" fill="#e2e8f0">port 53683</text>

    <!-- System -->
    <text x="40" y="488" fill="#f8fafc" font-weight="bold">System</text>
    <text x="40" y="504" fill="#475569">─────────────────────────────────────────────</text>
    <text x="40" y="522" fill="#e2e8f0">up 1 day, 7:39, load averages: 0.75 1.07 1.23</text>

    <!-- Disk -->
    <text x="40" y="554" fill="#f8fafc" font-weight="bold">Disk Usage</text>
    <text x="40" y="570" fill="#475569">─────────────────────────────────────────────</text>
    <text x="40" y="588" fill="#e2e8f0">Used: 12Gi / 1.8Ti (1%)</text>
